<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">

<section>
    <h2 th:text="${servicio.id != null} ? '✏️ Editar Servicio' : '🌷 Nuevo Servicio'">Servicio</h2>

    <form th:action="@{/servicios/guardar}" method="post" th:object="${servicio}">
        <input type="hidden" th:field="*{id}">

        <label>Nombre del servicio:</label>
        <input type="text" th:field="*{nombre}" placeholder="Ej: Corte de cabello, Manicure..." required>

        <label>Precio (₡):</label>
        <input type="number" step="0.01" th:field="*{precio}" placeholder="Ej: 8500.00" required>

        <label>Categoría:</label>
        <select th:field="*{categoria.id}" required>
            <option value="">-- Seleccione una categoría --</option>
            <option th:each="c : ${categorias}"
                    th:value="${c.id}"
                    th:text="${c.nombre}">
            </option>
        </select>

        <br/>
        <button type="submit">Guardar 💕</button>
        <a class="boton" th:href="@{/servicios}">Cancelar</a>
    </form>
</section>
</html>
