<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(section)">
<head>
    <meta charset="UTF-8">
    <title>Salón Glamour 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fff0f6;
        }

        /* ── HEADER ── */
        header {
            background: linear-gradient(135deg, #ffb6c1, #ff85a1);
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(255,105,180,0.2);
        }
        header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #7a1a40;
            letter-spacing: 1px;
        }
        header p {
            font-size: 0.95rem;
            color: #9e3562;
            margin-top: 4px;
        }

        /* ── NAVBAR ── */
        nav {
            background: #ff69b4;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 4px;
            box-shadow: 0 2px 6px rgba(255,105,180,0.3);
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 12px 22px;
            display: inline-block;
            transition: background 0.2s;
        }
        nav a:hover {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        /* ── MAIN ── */
        main {
            max-width: 1000px;
            margin: 30px auto;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(255,105,180,0.12);
        }
        main h2 {
            color: #cc3d77;
            font-size: 1.4rem;
            margin-bottom: 16px;
            border-bottom: 2px solid #ffc0cb;
            padding-bottom: 8px;
        }

        /* ── BOTONES ── */
        button, .boton {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            display: inline-block;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover, .boton:hover {
            background-color: #e0559f;
            transform: translateY(-1px);
        }

        /* ── TABLA ── */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        thead tr {
            background: #ff69b4;
            color: white;
        }
        th {
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 10px 14px;
            border-bottom: 1px solid #ffe4f0;
            color: #444;
        }
        tbody tr:hover td {
            background: #fff0f6;
        }

        /* ── FORMULARIOS ── */
        label {
            display: block;
            font-size: 0.85rem;
            color: #cc3d77;
            font-weight: 600;
            margin: 12px 0 4px;
        }
        input, select, textarea {
            width: 100%;
            padding: 9px 12px;
            border-radius: 10px;
            border: 1.5px solid #ffc0cb;
            font-family: 'Poppins', sans-serif;
            font-size: 0.88rem;
            background: #fff8fc;
            color: #333;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ff69b4;
        }

        /* ── IFRAME / VIDEO ── */
        .video-wrapper {
            margin: 16px 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(255,105,180,0.2);
        }
        .video-wrapper iframe {
            width: 100%;
            height: 315px;
            display: block;
            border: none;
        }

        /* ── PÁGINA INICIO ── */
        .promo-box {
            background: linear-gradient(135deg, #fff0f6, #ffe4f0);
            border: 1.5px solid #ffc0cb;
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }
        .promo-box p {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* ── FOOTER ── */
        footer {
            background: linear-gradient(135deg, #ffb6c1, #ff85a1);
            text-align: center;
            padding: 18px;
            margin-top: 40px;
            color: #7a1a40;
            font-size: 0.88rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <h1>💖 Salón Glamour 💖</h1>
    <p>Belleza que enamora</p>
</header>

<nav>
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/categorias}">Categorías</a>
    <a th:href="@{/servicios}">Servicios</a>
    <a th:href="@{/reservas}">Reservas</a>
    <a th:href="@{/contacto}">Contacto</a>
</nav>

<main>
    <div th:replace="${section}"></div>
</main>

<footer>
    <p>✨ © 2026 Salón Glamour — Todos los derechos reservados ✨</p>
</footer>

</body>
</html>
