<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Salón Glamour</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fff0f6;
            margin: 0;
        }
        header {
            background-color: #ffb6c1;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #ff69b4;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        footer {
            background-color: #ffb6c1;
            text-align: center;
            padding: 10px;
            margin-top: 30px;
        }
        main {
            padding: 30px;
        }
        button, .boton {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        button:hover, .boton:hover {
            opacity: 0.9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ffc0cb;
            padding: 10px;
            text-align: center;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ffc0cb;
        }
    </style>
</head>

<body>

<header>
    <h1>💖 Salón Glamour 💖</h1>
    <p>Belleza que enamora</p>
</header>

<nav>
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/categorias}">Categorías</a>
    <a th:href="@{/servicios}">Servicios</a>
    <a th:href="@{/contacto}">Contacto</a>
</nav>

<!-- AQUÍ SE INYECTA EL CONTENIDO DE CADA VISTA -->
<main th:replace="~{::section}"></main>

<footer>
    <p>✨ © 2026 Salón Glamour ✨</p>
</footer>

<!-- JS GIRLY -->
<script th:src="@{/js/app.js}"></script>

</body>
</html>
